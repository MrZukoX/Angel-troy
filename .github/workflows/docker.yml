name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Iniciar sesión en GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Generar las etiquetas (tags) automáticamente
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=1.0.0
            type=raw,value=latest

      # 4. Construir la imagen y subirla a GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 5. Probar la conexión SSH en el VPS
      - name: probar la ssh en el vps
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "probando conexion ssh..."
            mkdir -p ~/landinga
            touch ~/landinga/quintoa.txt

      # 6. Pasar archivos desde Git al VPS
      - name: pasar archivos desde el git al vps
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml,Makefile"
          target: "/home/${{ secrets.VPS_USER }}/landinga"

      # 7. Despliegue de los servicios (CON CAMBIOS APLICADOS)
      - name: Despliegue de los servicios
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "✅ Desplegando servicios"
            cd ~/landinga

            # Solución al error TTY: Usar parámetros directos en el login
            echo "==> Iniciando sesión en GHCR..."
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GHCR_PAT }}"

            # Solución al error de formato: Todo el repositorio en minúsculas (ajvera2000)
            echo "==> Descargando la imagen..."
            docker pull ghcr.io/ajvera2000/angelo:1.0.0

            echo "==> Desplegando stack..."
            docker stack deploy -c stack.yml --with-registry-auth angelo
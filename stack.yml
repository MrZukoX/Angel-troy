version: '3.8'

services:
  angelo:
    image: ghcr.io/mrzukox/angel-troy:latest
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      
      # Configuración HTTP -> HTTPS
      - "traefik.http.routers.borrar-angelo.entrypoints=http"
      - "traefik.http.routers.borrar-angelo.rule=Host(`angelo.byronrm.com`)"
      - "traefik.http.routers.borrar-angelo.middlewares=redirect-to-https"
      
      # Configuración HTTPS
      - "traefik.http.routers.borrar-angelo-secure.entrypoints=https"
      - "traefik.http.routers.borrar-angelo-secure.rule=Host(`angelo.byronrm.com`)"
      - "traefik.http.routers.borrar-angelo-secure.tls=true"
      - "traefik.http.routers.borrar-angelo-secure.tls.certresolver=http"
      
      # Forzar a Traefik a comunicarse explícitamente por la red overlay correcta
      - "traefik.http.routers.borrar-angelo-secure.service=borrar-angelo-svc"
      - "traefik.http.services.borrar-angelo-svc.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik-public"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  traefik-public:
    external: true
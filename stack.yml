version: '3.8'

services:
  angelo:
    image: ghcr.io/mrzukox/angel-troy:latest
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.angelo.entrypoints=http"
      - "traefik.http.routers.angelo.rule=Host(`angelo.byronrm.com`)"
      - "traefik.http.routers.angelo.middlewares=redirect-to-https"
      - "traefik.http.routers.angelo.service=angelo"
      - "traefik.http.routers.angelo-secure.entrypoints=https"
      - "traefik.http.routers.angelo-secure.rule=Host(`angelo.byronrm.com`)"
      - "traefik.http.routers.angelo-secure.tls=true"
      - "traefik.http.routers.angelo-secure.tls.certresolver=http"
      - "traefik.http.routers.angelo-secure.service=angelo"
      - "traefik.http.routers.pgangeltroy.entrypoints=http"
      - "traefik.http.routers.pgangeltroy.rule=Host(`pgangeltroy.byronrm.com`)"
      - "traefik.http.routers.pgangeltroy.middlewares=redirect-to-https"
      - "traefik.http.routers.pgangeltroy.service=angelo"
      - "traefik.http.routers.pgangeltroy-secure.entrypoints=https"
      - "traefik.http.routers.pgangeltroy-secure.rule=Host(`pgangeltroy.byronrm.com`)"
      - "traefik.http.routers.pgangeltroy-secure.tls=true"
      - "traefik.http.routers.pgangeltroy-secure.tls.certresolver=http"
      - "traefik.http.routers.pgangeltroy-secure.service=angelo"
      - "traefik.http.routers.portainerat.entrypoints=http"
      - "traefik.http.routers.portainerat.rule=Host(`portainerat.byronrm.com`)"
      - "traefik.http.routers.portainerat.middlewares=redirect-to-https"
      - "traefik.http.routers.portainerat.service=angelo"
      - "traefik.http.routers.portainerat-secure.entrypoints=https"
      - "traefik.http.routers.portainerat-secure.rule=Host(`portainerat.byronrm.com`)"
      - "traefik.http.routers.portainerat-secure.tls=true"
      - "traefik.http.routers.portainerat-secure.tls.certresolver=http"
      - "traefik.http.routers.portainerat-secure.service=angelo"
      - "traefik.http.services.angelo.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik-public"
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

networks:
  traefik-public:
    external: true